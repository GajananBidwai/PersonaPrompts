server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:travel_expense_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:25}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:false}
          starttls:
            enable: ${SMTP_STARTTLS:false}
          connectiontimeout: 5000
          timeout: 3000
          writetimeout: 3000

app:
  name: ${APP_NAME:Travel & Expense Management System}
  version: ${APP_VERSION:1.0.0}
  description: ${APP_DESCRIPTION:Enterprise Employee Travel & Expense Management System}
  security:
    jwt-secret: ${JWT_SECRET:your-secret-key-here-change-in-production}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  upload:
    max-file-size: ${APP_UPLOAD_MAX_FILE_SIZE:10MB}
    allowed-extensions: ${APP_UPLOAD_ALLOWED_EXTENSIONS:pdf,jpg,jpeg,png}
    path: ${APP_UPLOAD_PATH:./uploads}
  pagination:
    default-page-size: ${APP_PAGINATION_DEFAULT_PAGE_SIZE:20}
    max-page-size: ${APP_PAGINATION_MAX_PAGE_SIZE:100}

logging:
  level:
    root: INFO
    com.company.travelexpense: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO
