# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/travel_expense_db
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Application Configuration
app.name=Travel & Expense Management System
app.version=1.0.0
app.description=Enterprise Employee Travel & Expense Management System

# Security Configuration (basic)
app.security.jwt-secret=your-secret-key-here-change-in-production
app.security.jwt-expiration-ms=86400000

# File Upload Configuration
app.upload.max-file-size=10MB
app.upload.allowed-extensions=pdf,jpg,jpeg,png
app.upload.path=./uploads

# Pagination Configuration
app.pagination.default-page-size=20
app.pagination.max-page-size=100
