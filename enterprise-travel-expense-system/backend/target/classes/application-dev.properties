# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/travel_expense_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Application Configuration
app.name=${APP_NAME:Travel & Expense Management System}
app.version=${APP_VERSION:1.0.0}
app.description=${APP_DESCRIPTION:Enterprise Employee Travel & Expense Management System}

# Security Configuration
app.security.jwt-secret=${JWT_SECRET:your-secret-key-here-change-in-production}
app.security.jwt-expiration-ms=${JWT_EXPIRATION_MS:86400000}

# File Upload Configuration
app.upload.max-file-size=${APP_UPLOAD_MAX_FILE_SIZE:10MB}
app.upload.allowed-extensions=${APP_UPLOAD_ALLOWED_EXTENSIONS:pdf,jpg,jpeg,png}
app.upload.path=${APP_UPLOAD_PATH:./uploads}

# Pagination Configuration
app.pagination.default-page-size=${APP_PAGINATION_DEFAULT_PAGE_SIZE:20}
app.pagination.max-page-size=${APP_PAGINATION_MAX_PAGE_SIZE:100}

# Email Configuration (for notifications)
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:25}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH:false}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:false}
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=3000
